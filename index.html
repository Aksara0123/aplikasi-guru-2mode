<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>aplikasi-guru-2mode</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 font-sans">

  <div id="tampilan-dashboard" class="max-w-4xl mx-auto px-4 py-12">
    <div class="text-center mb-12">
      <div class="w-24 h-24 bg-blue-600 rounded-full mx-auto flex items-center justify-center text-white font-bold text-3xl shadow-md mb-4">
        <span>AG</span>
      </div>
      <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">aplikasi-guru-2mode</h1>
      <p class="text-slate-500 mt-2 text-sm md:text-base">Sistem Informasi Administrasi & Guru Terintegrasi</p>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
      <button onclick="pindahHalaman('master')" class="flex flex-col items-center justify-center p-6 bg-white border border-slate-200 rounded-xl shadow-sm hover:shadow-md hover:border-blue-500 transition-all text-center group">
        <div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-lg flex items-center justify-center mb-4 group-hover:bg-blue-600 group-hover:text-white transition-colors">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.58 4 8 4s8-2.21 8-4V7M4 7c0 2.21 3.58 4 8 4s8-2.21 8-4M4 7c0-2.21 3.58-4 8-4s8 2.21 8 4m0 5c0 2.21-3.58 4-8 4s-8-2.21-8-4"></path></svg>
        </div>
        <span class="font-bold text-lg text-slate-800">Master Data</span>
        <span class="text-xs text-slate-400 mt-1">Kelola Data Siswa, Guru, & Kelas</span>
      </button>

      <button onclick="pindahHalaman('walikelas')" class="flex flex-col items-center justify-center p-6 bg-white border border-slate-200 rounded-xl shadow-sm hover:shadow-md hover:border-emerald-500 transition-all text-center group">
        <div class="w-12 h-12 bg-emerald-50 text-emerald-600 rounded-lg flex items-center justify-center mb-4 group-hover:bg-emerald-600 group-hover:text-white transition-colors">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
        </div>
        <span class="font-bold text-lg text-slate-800">Walikelas</span>
        <span class="text-xs text-slate-400 mt-1">Laporan & Catatan Perkembangan Kelas</span>
      </button>

      <button onclick="pindahHalaman('mapel')" class="flex flex-col items-center justify-center p-6 bg-white border border-slate-200 rounded-xl shadow-sm hover:shadow-md hover:border-amber-500 transition-all text-center group">
        <div class="w-12 h-12 bg-amber-50 text-amber-600 rounded-lg flex items-center justify-center mb-4 group-hover:bg-amber-600 group-hover:text-white transition-colors">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.782 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
        </div>
        <span class="font-bold text-lg text-slate-800">Guru Mapel</span>
        <span class="text-xs text-slate-400 mt-1">Input Nilai & Presensi Mata Pelajaran</span>
      </button>

      <button onclick="pindahHalaman('administrasi')" class="flex flex-col items-center justify-center p-6 bg-white border border-slate-200 rounded-xl shadow-sm hover:shadow-md hover:border-purple-500 transition-all text-center group">
        <div class="w-12 h-12 bg-purple-50 text-purple-600 rounded-lg flex items-center justify-center mb-4 group-hover:bg-purple-600 group-hover:text-white transition-colors">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
        </div>
        <span class="font-bold text-lg text-slate-800">Administrasi Guru</span>
        <span class="text-xs text-slate-400 mt-1">Perangkat Pembelajaran, RPP, & Silabus</span>
      </button>
    </div>
  </div>

  <div id="tampilan-menu" class="hidden max-w-4xl mx-auto px-4 py-12">
    <button onclick="kembaliKeDashboard()" class="mb-6 flex items-center text-sm font-medium text-slate-600 hover:text-blue-600 transition-colors">
      <svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
      Kembali ke Dashboard
    </button>
    <div id="konten-spesifik" class="bg-white border border-slate-200 rounded-2xl p-8 shadow-sm"></div>
  </div>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzIVCcBzE5npBPGYmAm2naJNqBM3166aECxsyIjNwNVNDevobIQ7rf5mLIwYDdcEcCGlg/exec";
    let memoriSiswaPerKelas = [];
    let daftarSemuaKelas = []; 
    let menuAktifSaatIni = "";
    let statusSemuaWa = true; 

    // Fungsi pemicu saat tombol menu di-klik oleh pengguna
    function pindahHalaman(jenisMenu) {
      // Mengubah URL hash di browser secara otomatis (misal: #master atau #walikelas)
      window.location.hash = jenisMenu;
      eksekusiRenderMenu(jenisMenu);
    }

    // Fungsi inti untuk menampilkan isi konten menu
    function eksekusiRenderMenu(jenisMenu) {
      const dashboard = document.getElementById('tampilan-dashboard');
      const halamanMenu = document.getElementById('tampilan-menu');
      const kontenSpesifik = document.getElementById('konten-spesifik');

      dashboard.classList.add('hidden');
      halamanMenu.classList.remove('hidden');
      menuAktifSaatIni = jenisMenu;

      if (jenisMenu === 'master') {
        kontenSpesifik.innerHTML = `
          <div class="border-b border-slate-100 pb-4 mb-6 flex flex-wrap justify-between items-center gap-2">
            <div>
              <h2 class="text-2xl font-bold text-blue-600">Master Data</h2>
              <p class="text-slate-500 text-sm mt-1">Kelola basis data utama sekolah.</p>
            </div>
            <div class="flex flex-wrap gap-2">
              <button onclick="pilihSubMaster('siswa')" id="btn-sub-siswa" class="bg-blue-600 text-white font-medium px-3 py-2 rounded-lg text-xs shadow-sm transition-colors">Upload Siswa</button>
              <button onclick="pilihSubMaster('kelola')" id="btn-sub-kelola" class="bg-slate-100 text-slate-600 font-medium px-3 py-2 rounded-lg text-xs hover:bg-slate-200 transition-colors">Data Per Kelas</button>
              <button onclick="pilihSubMaster('guru')" id="btn-sub-guru" class="bg-slate-100 text-slate-600 font-medium px-3 py-2 rounded-lg text-xs hover:bg-slate-200 transition-colors">Data Guru</button>
            </div>
          </div>
          <div id="area-sub-master"></div>
        `;
        pilihSubMaster('siswa');
        ambilOtomatisDaftarKelas(); 
      } 
      else if (jenisMenu === 'walikelas') {
        kontenSpesifik.innerHTML = `
          <div class="border-b border-slate-100 pb-4 mb-6 flex flex-wrap justify-between items-center gap-2">
            <div>
              <h2 class="text-2xl font-bold text-emerald-600">Menu Walikelas</h2>
              <p class="text-slate-500 text-sm mt-1">Kelola kelas bimbingan Anda, input profil lengkap, dan absensi.</p>
            </div>
            <div class="flex flex-wrap gap-2">
              <button onclick="pilihSubWalikelas('profil')" id="btn-wali-profil" class="bg-emerald-600 text-white font-medium px-3 py-2 rounded-lg text-xs shadow-sm transition-colors">Tambah Siswa Lengkap</button>
              <button onclick="pilihSubWalikelas('absen')" id="btn-wali-absen" class="bg-slate-100 text-slate-600 font-medium px-3 py-2 rounded-lg text-xs hover:bg-slate-200 transition-colors">Absensi & Rekap</button>
            </div>
          </div>
          <div id="area-sub-walikelas"></div>
        `;
        pilihSubWalikelas('profil');
        ambilOtomatisDaftarKelas();
      }
      else {
        kontenSpesifik.innerHTML = `<p class="text-slate-600">Fitur belum diaktifkan.</p>`;
      }
    }

    function kembaliKeDashboard() {
      window.location.hash = ""; // Membersihkan tanda hash di alamat browser
      document.getElementById('tampilan-dashboard').classList.remove('hidden');
      document.getElementById('tampilan-menu').classList.add('hidden');
      menuAktifSaatIni = "";
    }

    function ambilOtomatisDaftarKelas() {
      kirimKeGoogleAppScript("getDaftarKelas", {}, function(response) {
        daftarSemuaKelas = response.data;
        perbaruiElemenDatalist();
      });
    }

    function perbaruiElemenDatalist() {
      const dl = document.getElementById('list-pilihan-kelas');
      if (!dl) return;
      let optionsHtml = "";
      daftarSemuaKelas.forEach(kelas => {
        optionsHtml += `<option value="${kelas}"></option>`;
      });
      dl.innerHTML = optionsHtml;
    }

    // ================= SUB-MENU WALIKELAS (PROFIL LENGKAP & ABSEN) =================

    function pilihSubWalikelas(sub) {
      const areaSub = document.getElementById('area-sub-walikelas');
      document.getElementById('btn-wali-profil').className = "bg-slate-100 text-slate-600 font-medium px-3 py-2 rounded-lg text-xs hover:bg-slate-200 transition-colors";
      document.getElementById('btn-wali-absen').className = "bg-slate-100 text-slate-600 font-medium px-3 py-2 rounded-lg text-xs hover:bg-slate-200 transition-colors";

      if (sub === 'profil') {
        document.getElementById('btn-wali-profil').className = "bg-emerald-600 text-white font-medium px-3 py-2 rounded-lg text-xs shadow-sm transition-colors";
        areaSub.innerHTML = `
          <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-slate-50 p-5 rounded-xl border border-slate-200 h-fit">
              <h3 class="font-bold text-slate-800 mb-4 text-xs tracking-wide uppercase text-slate-400">Profil Lengkap Siswa</h3>
              <form id="form-siswa-lengkap" onsubmit="tambahSiswaLengkap(event)">
                <div class="grid grid-cols-2 gap-2 mb-3">
                  <div><label class="block text-xs font-semibold text-slate-600 mb-1">Kelas *</label><input type="text" id="wl-kelas" list="list-pilihan-kelas" required class="w-full border border-slate-300 rounded-lg p-2 text-xs outline-none" placeholder="7-A"></div>
                  <div><label class="block text-xs font-semibold text-slate-600 mb-1">Nama Siswa *</label><input type="text" id="wl-nama" required class="w-full border border-slate-300 rounded-lg p-2 text-xs outline-none" placeholder="Nama lengkap"></div>
                </div>
                <div class="grid grid-cols-2 gap-2 mb-3">
                  <div><label class="block text-xs font-semibold text-slate-600 mb-1">NIS</label><input type="text" id="wl-nis" class="w-full border border-slate-300 rounded-lg p-2 text-xs outline-none" placeholder="NIS"></div>
                  <div><label class="block text-xs font-semibold text-slate-600 mb-1">NISN</label><input type="text" id="wl-nisn" class="w-full border border-slate-300 rounded-lg p-2 text-xs outline-none" placeholder="NISN"></div>
                </div>
                <div class="mb-3"><label class="block text-xs font-semibold text-slate-600 mb-1">No WA Orang Tua</label><input type="text" id="wl-ortu" class="w-full border border-slate-300 rounded-lg p-2 text-xs outline-none" placeholder="08xxxxxxxx"></div>
                <div class="grid grid-cols-2 gap-2 mb-3">
                  <div><label class="block text-xs font-semibold text-slate-600 mb-1">Nama Ayah</label><input type="text" id="wl-ayah" class="w-full border border-slate-300 rounded-lg p-2 text-xs outline-none" placeholder="Nama Ayah"></div>
                  <div><label class="block text-xs font-semibold text-slate-600 mb-1">Nama Ibu</label><input type="text" id="wl-ibu" class="w-full border border-slate-300 rounded-lg p-2 text-xs outline-none" placeholder="Nama Ibu"></div>
                </div>
                <div class="mb-4"><label class="block text-xs font-semibold text-slate-600 mb-1">Alamat Rumah</label><textarea id="wl-alamat" rows="2" class="w-full border border-slate-300 rounded-lg p-2 text-xs outline-none resize-none" placeholder="Alamat lengkap tempat tinggal"></textarea></div>
                <button type="submit" class="w-full bg-emerald-600 text-white text-xs py-2 rounded-lg font-bold hover:bg-emerald-700 shadow-sm">Simpan Profil Lengkap</button>
              </form>
            </div>
            
            <div class="md:col-span-2 space-y-4">
              <div class="bg-white p-4 rounded-xl border border-slate-200 flex gap-3 items-end justify-between">
                <div class="w-44">
                  <label class="block text-xs font-semibold text-slate-600 mb-1">Lihat & Unduh Data Kelas</label>
                  <input type="text" id="wl-cari-kelas" list="list-pilihan-kelas" class="w-full border border-slate-300 rounded-lg p-2 text-xs outline-none" placeholder="Pilih Kelas">
                </div>
                <div class="flex gap-2">
                  <button onclick="muatSiswaLengkapWalikelas()" class="bg-blue-600 text-white text-xs px-3 py-2 rounded-lg font-bold hover:bg-blue-700 h-9">Tampilkan</button>
                  <button onclick="unduhDataSiswaCSV()" class="bg-slate-700 text-white text-xs px-3 py-2 rounded-lg font-bold hover:bg-slate-800 h-9 flex items-center gap-1">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg> Unduh CSV
                  </button>
                </div>
              </div>
              <p class="text-[11px] text-slate-400 italic font-medium">💡 Info: Klik 2x pada kotak teks di tabel untuk mengedit langsung di tempat.</p>
              <div id="wl-area-tabel" class="overflow-x-auto border border-slate-200 rounded-xl bg-white min-h-[250px]">
                <div class="p-8 text-xs text-slate-400 text-center">Silakan pilih kelas bimbingan Anda lalu klik Tampilkan.</div>
              </div>
            </div>
          </div>
          <datalist id="list-pilihan-kelas"></datalist>
        `;
        perbaruiElemenDatalist();
      }
      else if (sub === 'absen') {
        document.getElementById('btn-wali-absen').className = "bg-emerald-600 text-white font-medium px-3 py-2 rounded-lg text-xs shadow-sm transition-colors";
        areaSub.innerHTML = `
          <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 space-y-4">
              <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 flex flex-wrap gap-3 items-end">
                <div class="w-32">
                  <label class="block text-xs font-semibold text-slate-600 mb-1">Kelas Target</label>
                  <input type="text" id="abs-kelas" list="list-pilihan-kelas" class="w-full border border-slate-300 rounded-lg p-2 text-xs outline-none" placeholder="Pilih Kelas">
                </div>
                <div class="w-32">
                  <label class="block text-xs font-semibold text-slate-600 mb-1">Tanggal Absen</label>
                  <input type="date" id="abs-tanggal" class="w-full border border-slate-300 rounded-lg p-2 text-xs outline-none">
                </div>
                <button onclick="muatSiswaUntukAbsen()" class="bg-emerald-600 text-white text-xs px-4 py-2 rounded-lg font-bold hover:bg-emerald-700 h-9">Mulai Absensi</button>
              </div>
              
              <div id="abs-area-tabel" class="overflow-x-auto border border-slate-200 rounded-xl bg-white min-h-[200px]">
                <div class="p-8 text-xs text-slate-400 text-center">Tentukan kelas dan tanggal untuk memuat daftar absensi harian siswa.</div>
              </div>
            </div>

            <div class="bg-white p-5 rounded-xl border border-slate-200 h-fit space-y-4">
              <h3 class="font-bold text-slate-900 text-sm border-b border-slate-100 pb-2 flex items-center gap-1.5 text-blue-600">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                Unduh Rekap Bulanan & Ujian
              </h3>
              <div>
                <label class="block text-xs font-semibold text-slate-600 mb-1">Pilih Kelas</label>
                <input type="text" id="rekap-kelas" list="list-pilihan-kelas" class="w-full border border-slate-300 rounded-lg p-2 text-xs outline-none" placeholder="Pilih Kelas">
              </div>
              <div>
                <label class="block text-xs font-semibold text-slate-600 mb-1">Pilih Rentang Periode</label>
                <select id="rekap-periode" onchange="toggleInputBulan()" class="w-full border border-slate-300 rounded-lg p-2 text-xs bg-white outline-none">
                  <option value="bulanan">📅 Rekap Bulanan</option>
                  <option value="pts1">🎯 Bulan Ke-3 (PTS Semester 1)</option>
                  <option value="pas1">📊 Bulan Ke-6 (PAS Semester 1)</option>
                  <option value="pts2">🎯 Bulan Ke-9 (PTS Semester 2)</option>
                  <option value="pat">🏆 Akhir Tahun (Kenaikan Kelas)</option>
                </select>
              </div>
              <div id="area-pilih-bulan">
                <label class="block text-xs font-semibold text-slate-600 mb-1">Pilih Bulan</label>
                <input type="month" id="rekap-bulan" class="w-full border border-slate-300 rounded-lg p-2 text-xs outline-none">
              </div>
              <button onclick="prosesUnduhRekapAbsen()" class="w-full bg-blue-600 text-white text-xs py-2.5 rounded-lg font-bold hover:bg-blue-700 shadow-sm transition-all flex items-center justify-center gap-1.5">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                Unduh Laporan Rekap (.CSV)
              </button>
            </div>
          </div>
          <datalist id="list-pilihan-kelas"></datalist>
        `;
        document.getElementById('abs-tanggal').valueAsDate = new Date();
        
        const hariIni = new Date();
        const bln = String(hariIni.getMonth() + 1).padStart(2, '0');
        document.getElementById('rekap-bulan').value = `${hariIni.getFullYear()}-${bln}`;

        perbaruiElemenDatalist();
      }
    }

    function toggleInputBulan() {
      const p = document.getElementById('rekap-periode').value;
      const b = document.getElementById('area-pilih-bulan');
      if (p === 'bulanan') {
        b.classList.remove('hidden');
      } else {
        b.classList.add('hidden');
      }
    }

    // ================= FUNGSI PROFIL LENGKAP SISWA =================

    function tambahSiswaLengkap(e) {
      e.preventDefault();
      const payload = {
        kelas: document.getElementById('wl-kelas').value,
        nama: document.getElementById('wl-nama').value,
        nis: document.getElementById('wl-nis').value,
        nisn: document.getElementById('wl-nisn').value,
        noOrtu: document.getElementById('wl-ortu').value,
        ayah: document.getElementById('wl-ayah').value,
        ibu: document.getElementById('wl-ibu').value,
        alamat: document.getElementById('wl-alamat').value
      };

      kirimKeGoogleAppScript("uploadSiswaLengkap", { data: payload }, function(res) {
        alert(res.message);
        document.getElementById('form-siswa-lengkap').reset();
        ambilOtomatisDaftarKelas();
      });
    }

    function muatSiswaLengkapWalikelas() {
      const kelas = document.getElementById('wl-cari-kelas').value;
      const area = document.getElementById('wl-area-tabel');
      if (!kelas) { alert("Pilih kelas terlebih dahulu!"); return; }

      area.innerHTML = "<div class='p-8 text-center text-xs text-emerald-600 animate-pulse font-medium'>Memuat data lengkap...</div>";

      kirimKeGoogleAppScript("getSiswaPerKelas", { kelas: kelas }, function(res) {
        memoriSiswaPerKelas = res.data;
        if (memoriSiswaPerKelas.length === 0) {
          area.innerHTML = "<div class='p-8 text-xs text-red-500 text-center'>Tidak ada siswa di kelas ini.</div>";
          return;
        }

        let html = `
          <table class="w-full text-left text-xs border-collapse table-fixed">
            <thead>
              <tr class="bg-slate-100 border-b border-slate-200 text-slate-700 font-semibold">
                <th class="p-2 w-10 text-center">No</th>
                <th class="p-2 w-32">Nama</th>
                <th class="p-2 w-20">NIS</th>
                <th class="p-2 w-24">NISN</th>
                <th class="p-2 w-28">Orang Tua (WA)</th>
                <th class="p-2 w-24">Ayah</th>
                <th class="p-2 w-24">Ibu</th>
                <th class="p-2 w-36">Alamat</th>
                <th class="p-2 text-center w-16">Aksi</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-slate-100">`;
        memoriSiswaPerKelas.forEach((s, idx) => {
          html += `
            <tr class="hover:bg-slate-50/80">
              <td class="p-2 text-center text-slate-400">${idx+1}</td>
              <td class="p-2 font-medium text-slate-900 cursor-pointer hover:bg-amber-50 truncate" title="${s.nama}" ondblclick="ubahMenjadiInputInline(this, ${idx}, 'nama')">${s.nama}</td>
              <td class="p-2 font-mono cursor-pointer hover:bg-amber-50 truncate" title="${s.nis || ''}" ondblclick="ubahMenjadiInputInline(this, ${idx}, 'nis')">${s.nis || ""}</td>

    function cekOtomatisSiswaAbsen(idx) {
      const status = document.getElementById(`status-abs-${idx}`).value;
      const cbWa = document.getElementById(`wa-ortu-${idx}`);

    function simpanDanKirimAbsen(daftarSiswa) {
      const tgl = document.getElementById('abs-tanggal').value;
      const kelas = document.getElementById('abs-kelas').value;
      const areaTombol = document.getElementById('area-tombol-absen');
      
      let hitungWaDikirim = 0;
      let dataKirimKeSheet = [];

      areaTombol.innerHTML = "<span class='text-xs text-emerald-600 font-bold animate-pulse py-2.5'>Sedang menyimpan ke Google Sheets...</span>";

      daftarSiswa.forEach((s, idx) => {
        const status = document.getElementById(`status-abs-${idx}`).value;
        const laporkanWa = document.getElementById(`wa-ortu-${idx}`).checked;

        dataKirimKeSheet.push({
          nama: s.nama,
          status: status
        });

        if (laporkanWa && s.noOrtu) {
          hitungWaDikirim++;
          let nomorBersih = s.noOrtu.replace(/[^0-9]/g, '');
          if (nomorBersih.startsWith('0')) nomorBersih = '62' + nomorBersih.slice(1);

          let pesan = `Yth. Orang Tua/Wali dari *${s.nama}* (Kelas ${s.kelas}).%0A%0AMemberitahukan bahwa pada tanggal *${tgl}*, ananda dinyatakan: *${status.toUpperCase()}* dalam kegiatan belajar mengajar.%0A%0ATerima kasih.%0A_Sistem Informasi Sekolah_`;
          
          setTimeout(() => {
            window.open(`https://api.whatsapp.com/send?phone=${nomorBersih}&text=${pesan}`, '_blank');
          }, idx * 800);
        }
      });

      kirimKeGoogleAppScript("simpanAbsensiKeSheet", { tanggal: tgl, kelas: kelas, data: dataKirimKeSheet }, function(res) {
        alert(`Sukses! Data absensi kelas ${kelas} tanggal ${tgl} berhasil disimpan secara permanen di Google Sheets. ${hitungWaDikirim} antrean WhatsApp disiapkan.`);
        muatSiswaUntukAbsen(); 
      });
    }

    function prosesUnduhRekapAbsen() {
      const kelas = document.getElementById('rekap-kelas').value;

      const bulan = document.getElementById('rekap-bulan').value;

      if (!kelas) { alert("Pilih kelas terlebih dahulu untuk rekap laporan!"); return; }
      if (periode === 'bulanan' && !bulan) { alert("Pilih bulan rekap terlebih dahulu!"); return; }

      alert("Sistem sedang mengalkulasi data rekap di server cloud. Silakan tunggu sebentar...");

      kirimKeGoogleAppScript("getRekapAbsensi", { kelas: kelas, periode: periode, bulan: bulan }, function(res) {
        const dataRekap = res.data;
        if (dataRekap.length === 0) {
          alert(`Tidak ditemukan rekaman data absensi untuk Kelas ${kelas} pada periode yang dipilih.`);
          return;
        }

        let dataCsv = dataRekap.map((s, idx) => ({
          "No": idx + 1,
          "Nama Siswa": s.nama,
          "Total Hadir": s.hadir,
          "Sakit": s.sakit,
          "Izin": s.izin,
          "Alfa": s.alfa
        }));

        let csv = Papa.unparse(dataCsv, {
          delimiter: ";"
        });

        let blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csv], { type: 'text/csv;charset=utf-8;' });
        
        let keteranganFile = periode.toUpperCase();
        if (periode === 'bulanan') keteranganFile = `BULANAN_${bulan}`;

        let link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.setAttribute("download", `REKAP_ABSENSI_${kelas.replace(/ /g, '_')}_${keteranganFile}.csv`);

        link.click();
        document.body.removeChild(link);

    function prosesUnggahMasalSiswa() {
      const fileInput = document.getElementById('file-csv-siswa');
      const logArea = document.getElementById('log-preview-siswa');
      if (!fileInput.files[0]) { alert("Silakan pilih file .csv!"); return; }

      logArea.innerHTML = "<div class='p-8 text-center text-xs text-blue-600 animate-pulse font-medium'>Membaca berkas...</div>";

      Papa.parse(fileInput.files[0], {
        skipEmptyLines: true,
        complete: function(results) {
          let barisData = results.data;
          if (barisData.length > 0 && isNaN(Number(barisData[0][0]))) { barisData.shift(); }
          if (barisData.length === 0) { logArea.innerHTML = "<div class='p-8 text-center text-xs text-red-500'>Berkas kosong.</div>"; return; }

          barisData = barisData.map(row => {
            while (row.length < 6) { row.push(""); }
            return row.slice(0, 6);
          });

          kirimKeGoogleAppScript("uploadSiswa", { data: barisData }, function(response) {
            alert(response.message);
            fileInput.value = "";
            logArea.innerHTML = `<div class="p-8 text-xs text-emerald-600 text-center font-medium">${response.message}</div>`;
            ambilOtomatisDaftarKelas(); 
          });
        }
      });
    }

    function ubahMenjadiInputInline(elemenTd, indexSiswa, kolom) {
      if (elemenTd.querySelector('input')) return;
      const nilaiLama = elemenTd.innerText.trim();
      
      elemenTd.innerHTML = `
        <input type="text" 
          class="w-full min-w-[130px] border-2 border-blue-500 bg-amber-50 px-2 py-1.5 text-xs rounded shadow-sm outline-none font-semibold text-slate-900" 
          value="${nilaiLama}">
      `;
      
      const input = elemenTd.querySelector('input');
      input.focus();
      input.setSelectionRange(input.value.length, input.value.length);

      input.onblur = function() {
        konfirmasiDanSimpanInline(elemenTd, input, indexSiswa, kolom, nilaiLama);
      };

      input.onkeydown = function(e) {
        if (e.key === "Enter") { input.blur(); }
        if (e.key === "Escape") { elemenTd.innerHTML = nilaiLama; }
      };
    }

    function konfirmasiDanSimpanInline(elemenTd, elemenInput, indexSiswa, kolom, nilaiLama) {
      const nilaiBaru = elemenInput.value.trim();
      if (nilaiBaru === nilaiLama) { elemenTd.innerHTML = nilaiLama; return; }

      const s = memoriSiswaPerKelas[indexSiswa];
      const dataUpdate = {
        rowNum: s.rowNum,
        kelas: s.kelas,
        nis: kolom === 'nis' ? nilaiBaru : s.nis,
        nisn: kolom === 'nisn' ? nilaiBaru : s.nisn,
        nama: kolom === 'nama' ? nilaiBaru : s.nama,
        noOrtu: kolom === 'noOrtu' ? nilaiBaru : s.noOrtu,
        ayah: kolom === 'ayah' ? nilaiBaru : s.ayah,
        ibu: kolom === 'ibu' ? nilaiBaru : s.ibu,
        alamat: kolom === 'alamat' ? nilaiBaru : s.alamat
      };

      elemenTd.innerHTML = `<span class="text-blue-500 animate-pulse font-medium">Menyimpan...</span>`;
      kirimKeGoogleAppScript("updateSiswa", dataUpdate, function(res) {
        if (menuAktifSaatIni === 'master') { muatDataSiswaPerKelas(); } 
        else if (menuAktifSaatIni === 'walikelas') { muatSiswaLengkapWalikelas(); }
      });
    }

    function eksekusiHapusSiswa(index) {
      const s = memoriSiswaPerKelas[index];
      if (!confirm(`Apakah Anda yakin ingin menghapus "${s.nama}"?`)) return;

      kirimKeGoogleAppScript("hapusSiswa", { rowNum: s.rowNum }, function(res) {
        alert(res.message);
        if (menuAktifSaatIni === 'master') { muatDataSiswaPerKelas(); } 
        else if (menuAktifSaatIni === 'walikelas') { muatSiswaLengkapWalikelas(); }
      });
    }

    function kirimKeGoogleAppScript(action, payload, callback) {
      payload.action = action;
      fetch(WEB_APP_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(payload)
      })
      .then(res => res.json())
      .then(res => {
        if (res.status === "success") { callback(res); } 
        else { alert("❌ Gagal: " + res.message); }
      })
      .catch(err => { alert("Gagal terhubung ke Apps Script: " + err.message); });
    }

    // ================= DETEKSI NAVIGASI OTOMATIS BROWSER (HASH LISTENERS) =================

    // Listener 1: Memeriksa perubahan hash ketika tombol Back/Forward browser ditekan
    window.addEventListener("hashchange", function() {
      const hash = window.location.hash.replace("#", "");
      if (!hash) {
        // Jika hash kosong kembali ke dashboard utama
        document.getElementById('tampilan-dashboard').classList.remove('hidden');
        document.getElementById('tampilan-menu').classList.add('hidden');
        menuAktifSaatIni = "";
      } else if (hash !== menuAktifSaatIni) {
        // Jika mendeteksi hash baru, jalankan render kontennya
        eksekusiRenderMenu(hash);
      }
    });

    // Listener 2: Memeriksa hash saat halaman pertama kali dibuka / di-refresh oleh user (F5)
    window.addEventListener("DOMContentLoaded", function() {
      const hash = window.location.hash.replace("#", "");
      if (hash) {
        eksekusiRenderMenu(hash);
      }
    });
  </script>
</body>
</html>
